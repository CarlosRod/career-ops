            - generic [ref=e137]:
              - heading "Description" [level=2] [ref=e138]
              - generic [ref=e139]:
                - paragraph [ref=e140]: ABOUT US
                - paragraph [ref=e141]: At HUB International, we are a team of entrepreneurs. We believe in protecting and supporting the aspirations of individuals, families, and businesses. We help our clients evaluate their risks and develop solutions tailored to their needs. We believe in empowering our employees to learn, grow, and make a difference. Our structure enables our teams to maintain their own unique, regional culture while leveraging support and resources from our corporate centers of excellence.
                - paragraph
                - paragraph [ref=e142]: HUB is a global insurance and employee benefits broker, providing a boundaryless array of business insurance, employee benefits, risk services, personal insurance, retirement, and private wealth management products and services. With over $5 billion in revenue and almost 20,000 employees in 600 offices throughout North America, HUB has grown substantially, in part due to our industry leading success in mergers and acquisitions
                - paragraph
                - paragraph [ref=e143]: Program Manager
                - paragraph [ref=e144]: Technology & Operations PMO | HUB International
                - paragraph
                - heading "About the Role" [level=1] [ref=e145]
                - paragraph [ref=e146]: HUB International’s Technology & Operations PMO is looking for a dynamic Program Manager to join our growing team and drive high-impact delivery across TechOps. Your first assignment will be leading our AI initiative portfolio and supporting the organizational build-out of emerging AI capabilities — a high-visibility, high-impact area where you will partner with business leaders, technology teams, and governance bodies to deliver scalable, secure, and transformative solutions while helping stand up the structures, processes, and governance models that make it sustainable.
                - paragraph
                - paragraph [ref=e147]: As a member of the PMO, you will be assigned to programs based on portfolio need over time. In each assignment, you’ll work directly with product owners and technology leaders who define the roadmap and vision, then take ownership of translating that into structured plans, coordinated delivery, and disciplined execution. Your success is measured by your ability to cut through complexity, keep programs moving, and bring the right people together at the right time.
                - paragraph
                - heading "What You’ll Do" [level=1] [ref=e148]
                - heading "Program Execution" [level=2] [ref=e149]
                - list [ref=e150]:
                  - listitem [ref=e151]: Partner with product owners to intake initiative roadmaps and translate them into actionable program plans with clear milestones, dependencies, and resource needs
                  - listitem [ref=e152]: Drive day-to-day execution across active programs, proactively identifying and removing blockers, managing interdependencies, and keeping delivery on track
                  - listitem [ref=e153]: Coordinate across technology teams, vendors, and stakeholders to align on sequencing, capacity, and delivery commitments
                  - listitem [ref=e154]: Maintain program-level visibility through consistent status reporting, risk tracking, and issue escalation — ensuring leadership has an accurate, timely picture of progress
                  - listitem [ref=e155]: Support pilot and rollout activities by coordinating readiness across technology, change management, and operations teams
                - paragraph
                - heading "What You Bring" [level=1] [ref=e156]
                - heading "Experience & Background" [level=2] [ref=e157]
                - list [ref=e158]:
                  - listitem [ref=e159]: 5+ years of program management experience, with a strong track record of driving delivery in complex, matrixed technology organizations
                  - listitem [ref=e160]: Experience executing AI, automation, or emerging technology programs — coordinating across technical teams, vendors, and stakeholders through delivery
                  - listitem [ref=e161]: Demonstrated ability to manage across program types — while your first assignment will focus on AI, comfort picking up new program domains quickly is essential
                  - listitem [ref=e162]: Background supporting organizational launches or capability stand-ups, managing the execution side of structural transitions
                  - listitem [ref=e163]: Familiarity with AI governance principles or responsible AI frameworks
                  - listitem [ref=e164]: Exposure to enterprise technology environments (infrastructure, enterprise applications, security, or similar)
                - paragraph
                - heading "Skills & Competencies" [level=2] [ref=e165]
                - list [ref=e166]:
                  - listitem [ref=e167]: Exceptional execution discipline — you follow through, close loops, and don’t let things fall through the cracks
                  - listitem [ref=e168]: Strong ability to translate strategic direction into structured plans, timelines, and delivery cadences
                  - listitem [ref=e169]: Skilled at navigating ambiguity and managing competing priorities without losing momentum
                  - listitem [ref=e170]: Clear, confident communicator who can adapt messaging for technical teams, change leads, and executive stakeholders
                - paragraph
                - heading "Nice to Have" [level=2] [ref=e171]
                - list [ref=e172]:
                  - listitem [ref=e173]: PMP, PgMP, or equivalent program management certification
                  - listitem [ref=e174]: Exposure to change management methodologies (Prosci, ADKAR)
                  - listitem [ref=e175]: Experience in insurance, financial services, or other regulated industries
                - paragraph
                - paragraph [ref=e176]: JOIN OUR TEAM
                - paragraph [ref=e177]: "Do you believe in the power of innovation, collaboration, and transformation? Do you thrive in a supportive and client focused work environment? Are you looking for an opportunity to help build and drive change in a rapidly growing and evolving organization? When you join HUB International, you will be part of a community of learners and doers focused on our Core Values: entrepreneurship, teamwork, integrity, accountability, and service."
                - paragraph
                - paragraph [ref=e178]: "Disclosure required under applicable law in California, Colorado, Illinois, Maryland, Minnesota, New York, New Jersey, and Washington states: The expected salary range for this position is $ 140,000 to $160,000 and will be impacted by factors such as the successful candidate’s skills, experience and working location, as well as the specific position’s business line, scope and level. If you believe that your qualifications and experience surpass the minimum requirements for this role, we encourage you to submit your application. By doing so, we will be able to keep your application on file for consideration for potential future positions within our organization. HUB International is proud to offer comprehensive benefit and total compensation packages which could include health/dental/vision/life/disability insurance, FSA, HSA and 401(k) accounts, paid-time-off benefits such as vacation, sick, and personal days, and eligible bonuses, equity and commissions for some positions."
